<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<link rel="stylesheet" href="style.css">

<style>

/* Checkout Section */
.checkout-container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
}

.checkout-box{
    background:white;
    padding:30px;
    width:400px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(26, 19, 19, 0.2);
    text-align:center;
}

.form-row{
    display:flex;
    align-items:center;
    margin-bottom:15px;
}

.form-row label{
    width:100px;
    text-align:left;
}

.form-row input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

.checkout-box button{
    width:100%;
    padding:12px;
    background:#4b2e2b;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.checkout-box button:hover{
    background:#2f1c19;
}

</style>
</head>

<body>

<header>
<nav>

<div class="navbar">

<div class="logo" style="color:#4b2e2b">
<img src="images/ORL2ZQ0-removebg-preview.jpg.png">
GRAND CAFE
</div>

<ul class="n" id="navlink">

<li><a href="#">Login</a></li>
<li><a href="#">Home</a></li>

<li class="dropdown">
<a href="#">Reserve</a>
<ul class="dropdown-menu">
<li><a href="#">Reserve Table</a></li>
<li><a href="#">Track Reservation</a></li>
</ul>
</li>

<li class="dropdown">
<a href="#">Order</a>
<ul class="dropdown-menu">
<li><a href="#">Order Item</a></li>
<li><a href="#">Track Order</a></li>
</ul>
</li>

<li><a href="#">Gallery</a></li>
<li><a href="#">Contact</a></li>

</ul>

<div class="hamburger" onclick="toggleMenu()">☰</div>

</div>

</nav>
</header>

<div class="checkout-container">

<div class="checkout-box">

<h2>Checkout</h2>

<form>

<div class="form-row">
<label>Name:</label>
<input type="text" required>
</div>

<div class="form-row">
<label>Phone:</label>
<input type="text" required>
</div>

<button type="submit">Place Order</button>

</form>

</div>

</div>

<script>

function toggleMenu(){
document.getElementById("navlink").classList.toggle("show");
}

</script>

</body>
</html>
